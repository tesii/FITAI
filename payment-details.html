<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Processing Payment</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d0f12;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      flex-direction: column;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #d4ff3f;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    h2 {
      color: #d4ff3f;
    }

    p {
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="loader"></div>
  <h2>Redirecting to secure payment...</h2>
  <p>Please wait</p>

  <script>
    // immediately redirect to backend-created payment link
    window.location.href = "subscribe.html";
  </script>

</body>
</html>
