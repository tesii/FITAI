<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Fitness Coach</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: auto;
    }

    .chat-header {
      padding: 20px;
      background: #222;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .msg.ai {
      background: #333;
    }

    .msg.user {
      background: #28a745;
      align-self: flex-end;
    }

    .chat-input {
      display: flex;
      padding: 10px;
      background: #222;
      border-top: 1px solid #333;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-right: 10px;
    }

    .chat-input button {
      padding: 10px 15px;
      border: none;
      background: #28a745;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .chat-input button:hover {
      background: #218838;
    }
  </style>
</head>

<body>

  <div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
      <h1>🤖 AI Fitness Coach</h1>
      <p>Tell me your goal and I’ll build your workout 💪</p>
    </div>

    <!-- CHAT BOX -->
    <div id="chatBox" class="chat-box"></div>

    <!-- INPUT -->
    <div class="chat-input">
      <input id="userInput" type="text" placeholder="e.g. beginner glutes workout bulking..." />
      <button id="sendBtn">Send</button>
    </div>

  </div>

  <!-- JS -->
  <script type="module" src="src/pages/workout.js"></script>

</body>
</html>
