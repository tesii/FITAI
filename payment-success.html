<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Success - FitAI</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: #0d0f12;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #171a1f;
      border: 1px solid #262b33;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      width: 90%;
      max-width: 420px;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #2a2f36;
      border-top: 4px solid #d4ff3f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      color: #8b95a7;
      font-size: 14px;
      line-height: 1.5;
    }

    .success {
      color: #38d39f;
      font-weight: 700;
      margin-top: 10px;
    }

    .error {
      color: #ff6b6b;
      font-weight: 700;
      margin-top: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 18px;
      background: #d4ff3f;
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      display: none;
    }
  </style>
</head>

<body style="background:#0d0f12;color:white;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
  
  <div>
    <h1>Processing Payment...</h1>
    <p>Please wait while we verify your payment.</p>
  </div>

<script type="module">
import { supabase } from "./src/lib/supabaseClient.js";

const API_URL = "http://localhost:3000";

async function verifyPayment() {
  const urlParams = new URLSearchParams(window.location.search);
  const tx_ref = urlParams.get("tx_ref");

  if (!tx_ref) {
    document.body.innerHTML = "Invalid payment reference";
    return;
  }

  const res = await fetch(`${API_URL}/api/verify-payment/${tx_ref}`);
  const data = await res.json();

  if (data.success) {
    document.body.innerHTML = "<h1>Payment Successful 🎉</h1>";

    setTimeout(() => {
      window.location.href = "user_dashboard.html";
    }, 2000);

  } else {
    document.body.innerHTML = "<h1>Payment Failed ❌</h1>";
  }
}

verifyPayment();
</script>

</body>
</html>
